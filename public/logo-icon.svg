<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FFFD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20B2AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66CDAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008B8B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地球轮廓 -->
  <circle cx="100" cy="90" r="70" fill="none" stroke="url(#globeGrad)" stroke-width="4" opacity="0.8"/>
  
  <!-- 经线 -->
  <path d="M 100 20 Q 130 90 100 160" fill="none" stroke="url(#globeGrad)" stroke-width="3" opacity="0.6"/>
  <path d="M 100 20 Q 70 90 100 160" fill="none" stroke="url(#globeGrad)" stroke-width="3" opacity="0.6"/>
  
  <!-- 纬线 -->
  <ellipse cx="100" cy="60" rx="55" ry="12" fill="none" stroke="url(#globeGrad)" stroke-width="2" opacity="0.5"/>
  <ellipse cx="100" cy="120" rx="55" ry="12" fill="none" stroke="url(#globeGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- 医疗十字 -->
  <rect x="85" y="55" width="30" height="30" rx="3" fill="url(#globeGrad)" opacity="0.9"/>
  <rect x="97" y="45" width="6" height="50" rx="2" fill="url(#globeGrad)" opacity="0.9"/>
  <rect x="75" y="67" width="50" height="6" rx="2" fill="url(#globeGrad)" opacity="0.9"/>
  
  <!-- 波浪 -->
  <path d="M 30 145 Q 55 135 80 145 Q 105 155 130 145 Q 155 135 170 145" 
        fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 35 160 Q 60 150 85 160 Q 110 170 135 160 Q 160 150 175 160" 
        fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  
  <!-- 叶子/水滴 -->
  <path d="M 145 80 Q 165 100 155 120 Q 145 110 145 80" 
        fill="#F5F5DC" opacity="0.9"/>
  <path d="M 150 95 Q 155 105 152 112" 
        fill="none" stroke="#20B2AA" stroke-width="1.5" opacity="0.7"/>
</svg>
